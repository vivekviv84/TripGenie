services:
  - type: web
    name: tripgenie-ai-backend
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/api/v1/health/live"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_API_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_WORKSHEET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        sync: false
